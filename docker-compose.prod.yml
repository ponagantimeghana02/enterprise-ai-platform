services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackroth-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/enterprise_ai
      REDIS_URL: redis://redis:6379
      CHROMA_PATH: /app/storage/chroma_db
    depends_on:
      - postgres
      - redis
      - chromadb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blackroth-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: blackroth-postgres
    environment:
      POSTGRES_DB: enterprise_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: blackroth-redis
    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma:latest
    container_name: blackroth-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data: