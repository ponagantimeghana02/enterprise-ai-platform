version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: enterprise_backend

    ports:
      - "8000:8000"

    restart: always

    env_file:
      - ./backend/.env

    depends_on:
      - postgres
      - redis

    volumes:
      - ./backend:/app

  postgres:

    image: postgres:18

    container_name: enterprise_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: enterprise_ai_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: enterprise_redis

    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:

  postgres_data:

  redis_data: