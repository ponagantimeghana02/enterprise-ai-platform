apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: fastapi-hpa
  namespace: enterprise-app

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: fastapi-backend

  minReplicas: 2

  maxReplicas: 5

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70