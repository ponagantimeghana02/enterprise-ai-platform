apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: enterprise-ingress
  namespace: enterprise-app

spec:

  ingressClassName: nginx

  rules:

  - host: enterprise.local

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: fastapi-service

            port:

              number: 80